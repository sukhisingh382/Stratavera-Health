<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ontario's Connected Health System</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; background:#0F5C4E; overflow:hidden; }

  .viz-wrap {
    width:100%; height:100vh;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    position:relative;
    background:radial-gradient(ellipse 85% 75% at 50% 45%,
      #1D7A60 0%, #0F5C4E 55%, #083D32 100%);
  }
  .viz-wrap::before {
    content:''; position:absolute; inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity:0.022; pointer-events:none;
  }

  .canvas-wrap {
    width:100%;
    max-width:min(100vw,177.78vh);
    aspect-ratio:16/9;
    position:relative;
  }
  svg#network { width:100%; height:100%; overflow:visible; }

  .caption-bar {
    position:absolute; bottom:0; left:0; right:0;
    padding:0 0 clamp(14px,3.5vh,38px);
    text-align:center; z-index:10;
  }
  .caption-text {
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
    font-size:clamp(12px,2vw,26px); font-weight:700;
    color:#fff; line-height:1.35;
    opacity:0; transform:translateY(6px);
    transition:opacity 0.6s ease,transform 0.6s ease;
    text-shadow:0 2px 10px rgba(0,0,0,0.45);
  }
  .caption-text.visible { opacity:1; transform:translateY(0); }
  .caption-dots { display:flex; justify-content:center; gap:6px; margin-top:8px; }
  .caption-dot {
    width:clamp(4px,.5vw,7px); height:clamp(4px,.5vw,7px);
    border-radius:50%; background:rgba(255,255,255,0.25); transition:background .3s;
  }
  .caption-dot.active { background:#52E0A5; }

  .node-tooltip {
    position:absolute;
    background:rgba(5,30,22,0.97);
    border:1px solid rgba(82,224,165,0.32);
    border-radius:8px; padding:10px 14px;
    pointer-events:none; z-index:20; max-width:245px;
    opacity:0; transition:opacity .2s; backdrop-filter:blur(12px);
  }
  .node-tooltip.visible { opacity:1; }
  .tooltip-title {
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
    font-size:clamp(9px,1.1vw,13px); font-weight:700;
    color:#52E0A5; margin-bottom:4px;
  }
  .tooltip-desc {
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
    font-size:clamp(8px,.9vw,11.5px); font-weight:400;
    color:rgba(255,255,255,.7); line-height:1.5;
  }

  /* SVG */
  .ring-outer { fill:none; stroke:rgba(255,255,255,.07); stroke-width:1; }
  .oht-ring   { fill:rgba(82,224,165,.04); stroke:rgba(82,224,165,.22);
                stroke-width:1.2; stroke-dasharray:8 5; }
  .link       { fill:none; stroke:rgba(255,255,255,.16); stroke-width:1.3; }
  .link-teal  { stroke:rgba(82,224,165,.28); }
  .nbo        { fill:rgba(255,255,255,.07); stroke:rgba(255,255,255,.26); stroke-width:1.2; }
  .nbi        { fill:rgba(255,255,255,.12); }
  .nbo-p      { fill:rgba(82,224,165,.18);  stroke:rgba(82,224,165,.78); stroke-width:1.8; }
  .nbi-p      { fill:rgba(82,224,165,.28); }
  .node-hit   { fill:transparent; stroke:none; cursor:pointer; }

  @keyframes pRing {
    0%  { r:30; opacity:.5; }
    100%{ r:58; opacity:0;  }
  }
  .pr1 { animation:pRing 2.5s ease-out infinite;
         fill:none; stroke:rgba(82,224,165,.45); stroke-width:1.5; }
  .pr2 { animation:pRing 2.5s ease-out 1.25s infinite;
         fill:none; stroke:rgba(82,224,165,.25); stroke-width:1; }

  @keyframes rotOHT {
    from{ transform:rotate(0deg); }
    to  { transform:rotate(360deg); }
  }
  .oht-grp { transform-origin:800px 450px; animation:rotOHT 70s linear infinite; }

  @keyframes nglow {
    0%,100%{ opacity:.08; } 50%{ opacity:.18; }
  }
  .nglow { animation:nglow 3s ease-in-out infinite; }

  /* label base */
  .lm  { font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:11.5px;
          font-weight:600; fill:rgba(255,255,255,.9); pointer-events:none; }
  .ls  { font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:9px;
          font-weight:400; fill:rgba(255,255,255,.52); pointer-events:none; }
  .lmo { font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:10.5px;
          font-weight:600; fill:rgba(255,255,255,.75); pointer-events:none; }
  .lso { font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:8.5px;
          font-weight:400; fill:rgba(255,255,255,.42); pointer-events:none; }
  /* Mental Health bold override */
  .lmh { font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:11.5px;
          font-weight:700; fill:rgba(255,255,255,.95); pointer-events:none; }
</style>
</head>

<div class="caption-bar">
  <div class="caption-text" id="captionText">
    Ontario's 58 Ontario Health Teams are reshaping integrated care across the province.
  </div>
  <div class="caption-dots" id="captionDots"></div>
</div>

<div class="node-tooltip" id="tooltip">
  <div class="tooltip-title" id="ttTitle"></div>
  <div class="tooltip-desc"  id="ttDesc"></div>
</div>
</div><!-- /viz-wrap -->

<script>
// ── CAPTIONS (verified numbers from ontario.ca / Ontario Health) ──
const captions = [
  "Ontario's 58 Ontario Health Teams are reshaping integrated care across the province.",
  "15 million Ontarians. One connected system, centred on the patient.",
  "The patient is at the centre of every system design decision.",
  "Home and community care: a 94% reduction in wait-listed patients since 2022–23.",
  "4,600+ pharmacies delivering expanded clinical services to Ontarians.",
  "Coordinated referrals ensure care moves with the patient.",
  "Primary care is the foundation of a high-performing health system.",
  "Mental Health & Addictions care is care — and it belongs in the system.",
  "Ontario's 626 long-term care homes serving 78,000+ residents.",
  "34 Public Health Units connecting prevention to the broader system."
];

const captionEl = document.getElementById('captionText');
const dotsEl    = document.getElementById('captionDots');
captions.forEach((_,i) => {
  const d = document.createElement('div');
  d.className = 'caption-dot' + (i===0?' active':'');
  dotsEl.appendChild(d);
});
let ci = 0;
setTimeout(() => captionEl.classList.add('visible'), 500);
setInterval(() => {
  captionEl.classList.remove('visible');
  setTimeout(() => {
    ci = (ci + 1) % captions.length;
    captionEl.textContent = captions[ci];
    captionEl.classList.add('visible');
    dotsEl.querySelectorAll('.caption-dot').forEach((d,i) => d.classList.toggle('active', i===ci));
  }, 650);
}, 4600);

// ── PARTICLES ──
const svgNS = 'http://www.w3.org/2000/svg';
const pGrp  = document.getElementById('particles');
const pDefs = [
  {x1:800,y1:420, x2:800,y2:280, c:'#52E0A5', d:2.2, dl:0},
  {x1:800,y1:420, x2:920,y2:332, c:'#52E0A5', d:2.5, dl:.9},
  {x1:832,y1:450, x2:965,y2:450, c:'#fff',    d:2.0, dl:.3},
  {x1:822,y1:472, x2:920,y2:568, c:'#fff',    d:2.3, dl:1.2},
  {x1:800,y1:482, x2:800,y2:618, c:'#fff',    d:2.1, dl:.6},
  {x1:778,y1:472, x2:680,y2:568, c:'#fff',    d:2.4, dl:.9},
  {x1:768,y1:450, x2:635,y2:450, c:'#52E0A5', d:2.0, dl:.2},
  {x1:778,y1:428, x2:680,y2:332, c:'#fff',    d:2.3, dl:1.5},
  {x1:800,y1:280, x2:800,y2:420, c:'rgba(255,255,255,.5)', d:3.1, dl:1.2},
  {x1:635,y1:450, x2:768,y2:450, c:'rgba(255,255,255,.5)', d:2.9, dl:.5},
  {x1:800,y1:148, x2:800,y2:250, c:'rgba(255,255,255,.4)', d:3.6, dl:.4},
  {x1:1015,y1:240,x2:838,y2:428,c:'rgba(255,255,255,.3)', d:4.0, dl:1.8},
  {x1:1105,y1:450,x2:993,y2:450,c:'rgba(255,255,255,.35)',d:3.3, dl:.7},
  {x1:495, y1:450,x2:607,y2:450,c:'rgba(82,224,165,.5)', d:3.9, dl:2.0},
  {x1:585, y1:240,x2:788,y2:278,c:'rgba(82,224,165,.4)', d:3.6, dl:1.1},
];

pDefs.forEach((p,idx) => {
  for(let k=0; k<2; k++){
    const pathEl = document.createElementNS(svgNS,'path');
    const pid = `p${idx}k${k}`;
    pathEl.setAttribute('id', pid);
    pathEl.setAttribute('d', `M${p.x1},${p.y1} L${p.x2},${p.y2}`);
    pathEl.setAttribute('fill','none'); pathEl.setAttribute('stroke','none');
    pGrp.appendChild(pathEl);

    const circ = document.createElementNS(svgNS,'circle');
    circ.setAttribute('r', p.c.includes('52E0A5') ? 3 : 2.5);
    circ.setAttribute('fill', p.c);
    circ.setAttribute('opacity','0.9');
    circ.setAttribute('filter','url(#glow)');

    const anim = document.createElementNS(svgNS,'animateMotion');
    anim.setAttribute('dur',  (p.d + k*p.d*.5)+'s');
    anim.setAttribute('begin',(p.dl + k*(p.d/2))+'s');
    anim.setAttribute('repeatCount','indefinite');
    const mpath = document.createElementNS(svgNS,'mpath');
    mpath.setAttributeNS('http://www.w3.org/1999/xlink','href','#'+pid);
    anim.appendChild(mpath); circ.appendChild(anim); pGrp.appendChild(circ);
  }
});

// ── TOOLTIPS ──
const tooltip = document.getElementById('tooltip');
const ttTitle  = document.getElementById('ttTitle');
const ttDesc   = document.getElementById('ttDesc');
const cWrap    = document.getElementById('canvasWrap');

document.querySelectorAll('.node-group').forEach(n => {
  const hit = n.querySelector('.node-hit');
  if(!hit) return;
  hit.addEventListener('mouseenter',() => {
    ttTitle.textContent = n.dataset.title||'';
    ttDesc.textContent  = n.dataset.desc||'';
    tooltip.classList.add('visible');
  });
  hit.addEventListener('mousemove', e => {
    const r = cWrap.getBoundingClientRect();
    let tx = e.clientX - r.left + 16;
    let ty = e.clientY - r.top  - 12;
    if(tx + 260 > r.width)  tx = e.clientX - r.left - 265;
    if(ty < 0) ty = e.clientY - r.top + 22;
    tooltip.style.left = tx+'px';
    tooltip.style.top  = ty+'px';
  });
  hit.addEventListener('mouseleave',() => tooltip.classList.remove('visible'));
});
</script>
